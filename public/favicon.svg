<svg viewBox="56 128 400 302" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --back-a: #1c2740; --back-b: #131b2c;
      --front-a: #35476e; --front-b: #22304a;
      --strap: #26334e;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --back-a: #46578a; --back-b: #333f63;
        --front-a: #66799f; --front-b: #4a5a80;
        --strap: #55668f;
      }
    }
  </style>
  <defs>
    <linearGradient id="backGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color: var(--back-a)"/>
